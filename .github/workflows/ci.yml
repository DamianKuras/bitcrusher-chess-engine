name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-20 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update && sudo apt-get install -y clang-format-20
          sudo ln -s /usr/bin/clang-format-20 /usr/local/bin/clang-format

      - name: Check formatting
        run: |
          find src tests benchmarks -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.hpp" \) \
            | xargs clang-format -i
          git diff --exit-code

  linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-14 g++-14 curl zip unzip tar
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '544a4c5c297e60e4ac4a5a1810df66748d908869'

      - name: Configure
        run: cmake --preset linux-tests-release

      - name: Build
        run: cmake --build --preset linux-tests-release

      - name: Run tests
        run: bin/Release/Tests --gtest_filter=-*slow

  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '544a4c5c297e60e4ac4a5a1810df66748d908869'

      - name: Configure
        run: cmake --preset tests

      - name: Build
        run: cmake --build --preset tests-release

      - name: Run tests
        run: bin\Release\Tests.exe --gtest_filter=-*slow
