server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API endpoints to the FastAPI container.
    location ~ ^/(health|legal-moves|evaluate|search|docs|redoc|openapi\.json) {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;   # search at high depth can take a while
    }

    # SPA fallback - unknown paths serve index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
